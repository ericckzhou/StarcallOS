packages:
  - 'packages/*'
  - 'apps/*'

# pnpm 11 gates native postinstall build scripts behind this explicit allow
# map. electron (downloads its binary) and esbuild (installs its binary) MUST
# be allowed or `pnpm install` fails with ERR_PNPM_IGNORED_BUILDS in CI.
allowBuilds:
  electron: true
  esbuild: true
  canvas: false
  # electron-builder 26 pulls in electron-winstaller (Squirrel.Windows installer
  # builder). We ship the portable target, not Squirrel, so its build script is
  # not needed — categorize it as not-built to avoid the CI ERR_PNPM_IGNORED_BUILDS.
  electron-winstaller: false
