name: dependabot auto-merge

# Auto-merge low-risk Dependabot updates (minor/patch) once required checks
# pass. Majors — and anything in the dependabot.yml `ignore` list — are left
# open for a human to review/migrate deliberately. `gh pr merge --auto` enables
# GitHub's auto-merge, so the PR only merges after the required `test` check on
# main goes green (see branch protection); it never merges ahead of CI.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor/patch
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
