version: 2
updates:
  # Root workspace + both packages share one pnpm lockfile, so a single npm
  # ecosystem entry at the repo root covers all of them.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk dev tooling so the inbox isn't flooded with one PR each.
      # Scope the group to minor/patch only: major dev-dep bumps (e.g. React 19,
      # TypeScript 6, Vitest 4) need a deliberate migration, so they should land
      # as individual PRs instead of being blobbed in with trivial patches.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Frontend/test-toolchain majors need a deliberate migration (codemods,
      # full renderer smoke-test), so don't open major-bump PRs for them — they
      # just get triaged and closed. Minor/patch still flow through the
      # dev-dependencies group above. Tackle these by hand when you choose to.
      # Note: this also suppresses a security update that would require one of
      # these majors — acceptable for build/test tooling that ships no runtime
      # surface. Electron and the PDF/SDK deps are deliberately NOT ignored.
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: "@types/react"
        update-types: [version-update:semver-major]
      - dependency-name: "@types/react-dom"
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: vitest
        update-types: [version-update:semver-major]
      - dependency-name: "@vitejs/plugin-react"
        update-types: [version-update:semver-major]
    labels:
      - dependencies

  # Keep the GitHub Actions used by ci.yml / release.yml current (pinned action
  # versions drift and accrue their own advisories).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
