appId: com.starcall.starcallos
productName: StarcallOS

# electron-vite emits the packaged main / preload / renderer here; this is what
# electron-builder ships inside the app bundle.
directories:
  output: dist
  buildResources: build

files:
  - "out/**"
  - "package.json"
  - "!**/*.map"

# Ship the PNG icon alongside the app so the BrowserWindow/taskbar icon resolves
# at runtime (the .exe file icon itself comes from win.icon below).
extraResources:
  - from: build/icon.png
    to: icon.png

# Portable target: self-extracting EXE that runs from %TEMP% with no install
# and no registry entries. Skips the SmartScreen-prompt-heavy NSIS flow for v0.1.
win:
  icon: build/icon.ico
  target:
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-portable-${arch}.${ext}

# macOS: ship a .dmg (drag-to-install) and a .zip (true portable .app) for both
# Intel (x64) and Apple Silicon (arm64). No native deps means electron-builder
# can cross-pack both arches from a single arm64 runner. Unsigned/un-notarized —
# Gatekeeper workaround is documented in the README. icon.png (512x512+) is
# auto-converted to .icns.
mac:
  icon: build/icon.png
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}

# Linux: AppImage is the single-file portable analog of the Windows portable
# .exe — chmod +x and run, no install. x64 only for now.
linux:
  icon: build/icon.png
  category: Education
  maintainer: Eric Zhou <ericckzhou@gmail.com>
  # Override the binary name explicitly: electron-builder derives it from the
  # package name (@starcall/desktop -> @starcalldesktop), and electron-builder 26
  # rejects the "@" as an unsafe path char. The user-facing AppImage filename
  # still comes from artifactName (productName) below.
  executableName: starcallos
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

# v0.1 ships unsigned on all platforms — the SmartScreen (Windows) and Gatekeeper
# (macOS) warnings are documented in the README. To sign later, set
# CSC_LINK + CSC_KEY_PASSWORD (and Apple notarization creds) at build time.
